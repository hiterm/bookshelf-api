type Author {
	id: ID!
	name: String!
	yomi: String!
}

type AuthorEventEntry {
	eventId: ID!
	eventSetId: ID!
	operation: String!
	authorId: ID!
	name: String
	yomi: String
	authorCreatedAt: Int
	authorUpdatedAt: Int
	changedAt: Int!
	extra: JSON
}

type AuthorMutationPayload {
	author: Author!
	eventSetId: ID!
	id: ID!
	name: String!
}

type Book {
	id: String!
	title: String!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
	createdAt: Int!
	updatedAt: Int!
	authors: [Author!]!
}

type BookEventEntry {
	eventId: ID!
	eventSetId: ID!
	operation: String!
	bookId: ID!
	title: String
	authorIds: [ID!]!
	isbn: String
	read: Boolean
	owned: Boolean
	priority: Int
	format: BookFormat
	store: BookStore
	bookCreatedAt: Int
	bookUpdatedAt: Int
	changedAt: Int!
	extra: JSON
}

enum BookFormat {
	E_BOOK
	PRINTED
	UNKNOWN
}

type BookMutationPayload {
	book: Book!
	eventSetId: ID!
	id: String!
	title: String!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
	createdAt: Int!
	updatedAt: Int!
}

enum BookStore {
	KINDLE
	UNKNOWN
}

input CreateAuthorInput {
	name: String!
}

input CreateBookInput {
	title: String!
	authorIds: [String!]!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
}

type DeleteAuthorPayload {
	authorId: ID!
	eventSetId: ID!
	id: ID!
}

type DeleteBookPayload {
	bookId: ID!
	eventSetId: ID!
	id: ID!
}

type EventSetDetail {
	id: ID!
	operation: String!
	createdAt: Int!
	bookEvents: [BookEventEntry!]!
	authorEvents: [AuthorEventEntry!]!
}

type EventSetEntry {
	id: ID!
	operation: String!
	createdAt: Int!
}

input ImportBookInput {
	"""
	Title of the book.
	"""
	title: String!
	"""
	Names of the authors. Authors will be created if they do not exist.
	"""
	authorNames: [String!]!
	"""
	ISBN of the book.
	"""
	isbn: String!
	"""
	Whether the book has been read.
	"""
	read: Boolean!
	"""
	Whether the book is owned.
	"""
	owned: Boolean!
	"""
	Priority value ranging from 0 to 100.
	"""
	priority: Int!
	"""
	Format of the book.
	"""
	format: BookFormat!
	"""
	Store where the book was purchased or obtained.
	"""
	store: BookStore!
}

type ImportBooksPayload {
	books: [Book!]!
	eventSetId: ID!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

type Mutation {
	registerUser: User!
	createBook(bookData: CreateBookInput!): BookMutationPayload!
	updateBook(bookData: UpdateBookInput!): BookMutationPayload!
	deleteBook(bookId: ID!): DeleteBookPayload!
	createAuthor(authorData: CreateAuthorInput!): AuthorMutationPayload!
	updateAuthor(authorData: UpdateAuthorInput!): AuthorMutationPayload!
	deleteAuthor(authorId: ID!): DeleteAuthorPayload!
	restoreBook(eventId: ID!): RestoreBookPayload!
	restoreAuthor(eventId: ID!): RestoreAuthorPayload!
	"""
	Imports multiple books. Creates authors if they do not exist.
	"""
	importBooks(books: [ImportBookInput!]!): ImportBooksPayload!
}

type Query {
	loggedInUser: User
	book(id: ID!): Book
	books: [Book!]!
	author(id: ID!): Author
	authors: [Author!]!
	"""
	Returns the change history for a book.
	Entries are sorted by `changedAt` in descending order (newest first).
	"""
	bookEvents(bookId: ID!): [BookEventEntry!]!
	"""
	Returns the change history for an author.
	Entries are sorted by `changedAt` in descending order (newest first).
	"""
	authorEvents(authorId: ID!): [AuthorEventEntry!]!
	"""
	Returns the logged-in user's event sets, newest first.
	"""
	eventSets: [EventSetEntry!]!
	"""
	Returns a single event set with nested events, or null if not found.
	"""
	eventSet(id: ID!): EventSetDetail
}

type RestoreAuthorPayload {
	author: Author
	eventSetId: ID!
}

type RestoreBookPayload {
	book: Book
	eventSetId: ID!
}

input UpdateAuthorInput {
	id: ID!
	name: String!
}

input UpdateBookInput {
	id: String!
	title: String!
	authorIds: [String!]!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
}

type User {
	id: ID!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}

