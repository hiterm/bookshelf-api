type Author {
	id: ID!
	name: String!
}

type AuthorEventEntry {
	eventId: ID!
	eventSetId: ID!
	operation: String!
	authorId: ID!
	name: String
	yomi: String
	authorCreatedAt: Int
	authorUpdatedAt: Int
	changedAt: Int!
	extra: JSON
}

type Book {
	id: String!
	title: String!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
	createdAt: Int!
	updatedAt: Int!
	authors: [Author!]!
}

type BookEventEntry {
	eventId: ID!
	eventSetId: ID!
	operation: String!
	bookId: ID!
	title: String
	authorIds: [ID!]!
	isbn: String
	read: Boolean
	owned: Boolean
	priority: Int
	format: BookFormat
	store: BookStore
	bookCreatedAt: Int
	bookUpdatedAt: Int
	changedAt: Int!
	extra: JSON
}

enum BookFormat {
	E_BOOK
	PRINTED
	UNKNOWN
}

enum BookStore {
	KINDLE
	UNKNOWN
}

input CreateAuthorInput {
	name: String!
}

input CreateBookInput {
	title: String!
	authorIds: [String!]!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
}

input ImportBookInput {
	"""
	Title of the book.
	"""
	title: String!
	"""
	Names of the authors. Authors will be created if they do not exist.
	"""
	authorNames: [String!]!
	"""
	ISBN of the book.
	"""
	isbn: String!
	"""
	Whether the book has been read.
	"""
	read: Boolean!
	"""
	Whether the book is owned.
	"""
	owned: Boolean!
	"""
	Priority value ranging from 0 to 100.
	"""
	priority: Int!
	"""
	Format of the book.
	"""
	format: BookFormat!
	"""
	Store where the book was purchased or obtained.
	"""
	store: BookStore!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

type Mutation {
	registerUser: User!
	createBook(bookData: CreateBookInput!): Book!
	updateBook(bookData: UpdateBookInput!): Book!
	deleteBook(bookId: ID!): String!
	createAuthor(authorData: CreateAuthorInput!): Author!
	updateAuthor(authorData: UpdateAuthorInput!): Author!
	deleteAuthor(authorId: ID!): String!
	restoreBook(eventId: ID!): Book
	restoreAuthor(eventId: ID!): Author
	"""
	Imports multiple books. Creates authors if they do not exist.
	"""
	importBooks(books: [ImportBookInput!]!): [Book!]!
}

type Query {
	loggedInUser: User
	book(id: ID!): Book
	books: [Book!]!
	author(id: ID!): Author
	authors: [Author!]!
	bookEvents(bookId: ID!): [BookEventEntry!]!
	authorEvents(authorId: ID!): [AuthorEventEntry!]!
}

input UpdateAuthorInput {
	id: ID!
	name: String!
}

input UpdateBookInput {
	id: String!
	title: String!
	authorIds: [String!]!
	isbn: String!
	read: Boolean!
	owned: Boolean!
	priority: Int!
	format: BookFormat!
	store: BookStore!
}

type User {
	id: ID!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}

