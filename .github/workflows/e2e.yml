name: E2E tests

on:
  push:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: true
        type: string
      release_pr_head_sha:
        description: Release pull request head SHA to receive E2E statuses
        required: true
        type: string

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Start Postgres service
        run: sudo systemctl start postgresql.service
      - name: Wait for Postgres
        run: |
          for _ in {1..30}; do
            if pg_isready; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready in time" >&2
          exit 1
      - name: Create DB and user
        run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" --command="\du" postgres
      - name: Create DB
        run: sudo -u postgres createdb --owner=bookshelf bookshelf
      - name: Start JWKS server
        run: |
          cargo run --locked -p bookshelf-e2e --bin bookshelf-jwks-server > jwks_server.log 2>&1 &
          for _ in {1..600}; do
            if curl -fs http://localhost:9999/.well-known/jwks.json > /dev/null; then
              echo "JWKS server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::JWKS server did not become ready in time"
          echo "--- JWKS server log ---"
          cat jwks_server.log
          exit 1
      - name: Start application server
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 8080
          ALLOWED_ORIGINS: 'http://localhost:8080'
          JWT_AUDIENCE: test-audience
          JWT_DOMAIN: test-issuer.local
          JWKS_URL: http://localhost:9999/.well-known/jwks.json
        run: |
          cargo run --locked > server.log 2>&1 &
          # Wait for server to be ready
          for _ in {1..600}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become ready in time"
          echo "--- Server log ---"
          cat server.log
          exit 1
      - name: Run tests
        env:
          TEST_SERVER_URL: http://localhost:8080
        run: |
          cargo test -p bookshelf-e2e --locked -- --test-threads=1

  test-integration-bookshelf:
    name: Integration tests (bookshelf frontend)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: hiterm/bookshelf
          ref: main
          path: bookshelf-src
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: bookshelf-src/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: bookshelf-src/pnpm-lock.yaml
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bookshelf-src/pnpm-lock.yaml') }}
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build API and prepare frontend
        run: |
          set -euo pipefail

          api_log="${RUNNER_TEMP}/bookshelf-api-build.log"
          api_duration="${RUNNER_TEMP}/bookshelf-api-build.duration"
          frontend_log="${RUNNER_TEMP}/bookshelf-frontend-prepare.log"
          frontend_duration="${RUNNER_TEMP}/bookshelf-frontend-prepare.duration"
          api_timing="${RUNNER_TEMP}/bookshelf-api-build.timing"
          frontend_timing="${RUNNER_TEMP}/bookshelf-frontend-prepare.timing"
          : >"${frontend_timing}"

          (
            set +e
            start_time=$(date +%s)
            cargo build --locked --release
            status=$?
            end_time=$(date +%s)
            echo "$((end_time - start_time))" >"${api_duration}"
            printf 'API build: %ss (status %s)\n' "$((end_time - start_time))" "${status}" >"${api_timing}"
            exit "${status}"
          ) >"${api_log}" 2>&1 &
          api_pid=$!

          (
            set +e
            start_time=$(date +%s)
            cd bookshelf-src
            status=$?
            if [ "${status}" -eq 0 ]; then
              step_start=$(date +%s)
              pnpm install --frozen-lockfile
              status=$?
              step_end=$(date +%s)
              printf 'Frontend pnpm install: %ss (status %s)\n' "$((step_end - step_start))" "${status}" >>"${frontend_timing}"
            fi
            if [ "${status}" -eq 0 ]; then
              step_start=$(date +%s)
              cp ../schema.graphql src/graphql/schema.graphql
              status=$?
              if [ "${status}" -eq 0 ]; then
                pnpm exec graphql-codegen --config codegen.yml
                status=$?
              fi
              if [ "${status}" -eq 0 ]; then
                pnpm exec msw init
                status=$?
              fi
              if [ "${status}" -eq 0 ]; then
                pnpm exec tsr generate
                status=$?
              fi
              step_end=$(date +%s)
              printf 'Frontend GraphQL generation: %ss (status %s)\n' "$((step_end - step_start))" "${status}" >>"${frontend_timing}"
            fi
            if [ "${status}" -eq 0 ]; then
              step_start=$(date +%s)
              pnpm run typecheck
              status=$?
              step_end=$(date +%s)
              printf 'Frontend typecheck: %ss (status %s)\n' "$((step_end - step_start))" "${status}" >>"${frontend_timing}"
            fi
            if [ "${status}" -eq 0 ]; then
              step_start=$(date +%s)
              pnpm exec playwright install --with-deps chromium
              status=$?
              step_end=$(date +%s)
              printf 'Frontend Playwright install: %ss (status %s)\n' "$((step_end - step_start))" "${status}" >>"${frontend_timing}"
            fi
            end_time=$(date +%s)
            echo "$((end_time - start_time))" >"${frontend_duration}"
            printf 'Frontend total: %ss (status %s)\n' "$((end_time - start_time))" "${status}" >>"${frontend_timing}"
            exit "${status}"
          ) >"${frontend_log}" 2>&1 &
          frontend_pid=$!

          set +e
          wait "${api_pid}"
          api_status=$?
          wait "${frontend_pid}"
          frontend_status=$?
          set -e

          api_seconds=$(cat "${api_duration}" 2>/dev/null || echo "unknown")
          frontend_seconds=$(cat "${frontend_duration}" 2>/dev/null || echo "unknown")

          echo "::group::Preparation timings"
          cat "${api_timing}" 2>/dev/null || true
          cat "${frontend_timing}" 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::API build log (${api_seconds}s, status ${api_status})"
          cat "${api_log}"
          echo "::endgroup::"

          echo "::group::Frontend preparation log (${frontend_seconds}s, status ${frontend_status})"
          cat "${frontend_log}"
          echo "::endgroup::"

          if [ "${api_status}" -ne 0 ] || [ "${frontend_status}" -ne 0 ]; then
            exit 1
          fi

          echo "API build and frontend preparation completed in parallel"
      - name: Start PostgreSQL
        run: sudo systemctl start postgresql.service
      - name: Wait for PostgreSQL
        run: |
          for _ in {1..30}; do
            if pg_isready; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready in time" >&2
          exit 1
      - name: Create DB user
        run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" --command="\du" postgres
      - name: Create DB
        run: sudo -u postgres createdb --owner=bookshelf bookshelf
      - name: Start JWKS server
        run: |
          node bookshelf-src/e2e-integration/jwks-server.mjs > /tmp/jwks.log 2>&1 &
          for _ in {1..30}; do
            if curl -fs http://localhost:9999/.well-known/jwks.json > /dev/null; then
              echo "JWKS server ready"; exit 0
            fi
            sleep 1
          done
          cat /tmp/jwks.log; exit 1
      - name: Start bookshelf-api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: "8080"
          ALLOWED_ORIGINS: http://localhost:4173
          JWT_AUDIENCE: test-audience
          JWT_DOMAIN: test-issuer.local
          JWKS_URL: http://localhost:9999/.well-known/jwks.json
        run: |
          ./target/release/bookshelf-api > /tmp/api.log 2>&1 &
          for _ in {1..60}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "API ready"; exit 0
            fi
            sleep 1
          done
          cat /tmp/api.log; exit 1
      - name: Run e2e-integration tests
        run: pnpm run test:integration
        working-directory: bookshelf-src

  release-pr-api-e2e-status:
    name: Report release PR API E2E status
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report API E2E status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.release_pr_head_sha }}
          REPOSITORY: ${{ github.repository }}
          RESULT: ${{ needs.e2e.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=error
          description="Release PR API E2E ended without a result"

          case "${RESULT}" in
            success)
              state=success
              description="Release PR API E2E passed"
              ;;
            failure)
              state=failure
              description="Release PR API E2E failed"
              ;;
          esac

          gh api --method POST \
            "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="${state}" \
            -f context=release-pr-api-e2e \
            -f description="${description}" \
            -f target_url="${RUN_URL}"

  release-pr-frontend-integration-status:
    name: Report release PR frontend integration status
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: test-integration-bookshelf
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report frontend integration status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.release_pr_head_sha }}
          REPOSITORY: ${{ github.repository }}
          RESULT: ${{ needs.test-integration-bookshelf.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=error
          description="Release PR frontend integration ended without a result"

          case "${RESULT}" in
            success)
              state=success
              description="Release PR frontend integration passed"
              ;;
            failure)
              state=failure
              description="Release PR frontend integration failed"
              ;;
          esac

          gh api --method POST \
            "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="${state}" \
            -f context=release-pr-frontend-integration \
            -f description="${description}" \
            -f target_url="${RUN_URL}"
