name: Deploy to Render

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
  push_to_registry:
    name: Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check out bookshelf frontend
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: hiterm/bookshelf
          ref: main
          path: bookshelf-src
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Cache
        # cache-poisoning: GHA cache is repo-scoped and this workflow only triggers on
        # release events, so cache poisoning by external actors is not a realistic risk.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning]
        id: cache
        with:
          path: |
            usr-local-cargo-registry
            app-target
          key: cache-${{ hashFiles('Dockerfile') }}

      - name: inject cache into docker
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "usr-local-cargo-registry": "/usr/local/cargo/registry",
              "app-target": "/app/target"
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}
        # cache-poisoning: GHA cache is repo-scoped and this workflow only triggers on
        # release events, so cache poisoning by external actors is not a realistic risk.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: bookshelf-src/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: bookshelf-src/pnpm-lock.yaml

      - uses: ./.github/actions/setup-rust-toolchain

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and test Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: bookshelf-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start PostgreSQL
        run: sudo systemctl start postgresql.service

      - name: Wait for PostgreSQL
        run: |
          for _ in {1..30}; do
            if pg_isready; then exit 0; fi
            sleep 1
          done
          echo "::error::Postgres did not become ready in time" >&2
          exit 1

      - name: Create DB user
        run: |
          sudo -u postgres psql \
            --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" \
            --command="\du" \
            postgres

      - name: Create DB
        run: sudo -u postgres createdb --owner=bookshelf bookshelf

      - name: Start JWKS server
        run: |
          node bookshelf-src/e2e-integration/jwks-server.mjs > /tmp/jwks.log 2>&1 &
          for _ in {1..30}; do
            if curl -fs http://localhost:9999/.well-known/jwks.json > /dev/null; then
              echo "JWKS server ready"; exit 0
            fi
            sleep 1
          done
          cat /tmp/jwks.log; exit 1

      - name: Start bookshelf-api
        run: |
          docker run -d --name bookshelf-api --network=host \
            -e PORT=8080 \
            -e DATABASE_URL=postgres://bookshelf:password@localhost:5432/bookshelf \
            -e ALLOWED_ORIGINS=http://localhost:4173 \
            -e JWT_AUDIENCE=test-audience \
            -e JWT_DOMAIN=test-issuer.local \
            -e JWKS_URL=http://localhost:9999/.well-known/jwks.json \
            bookshelf-api:test
          for _ in {1..60}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "API ready"; exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become ready in time"
          docker logs bookshelf-api
          exit 1

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
        working-directory: bookshelf-src

      - name: Generate GraphQL types
        run: pnpm run generate
        working-directory: bookshelf-src

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: bookshelf-src

      - name: Run e2e-integration tests
        run: pnpm run test:integration
        working-directory: bookshelf-src

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # secrets-outside-env: RENDER_DEPLOY_HOOK is safely passed via env: block in the step.
  # A GitHub Environment is not required here.
  deploy: # zizmor: ignore[secrets-outside-env]
    name: Deploy
    runs-on: ubuntu-latest
    needs: push_to_registry
    permissions: {}
    steps:
      - env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl "${RENDER_DEPLOY_HOOK}"
