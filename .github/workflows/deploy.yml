name: Deploy to Render

on:
  workflow_call:
    inputs:
      release_tag:
        description: Exact semantic-version Git tag to build and deploy
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
  validate_image:
    name: Validate release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - name: Check out the release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Cache
        # cache-poisoning: this reusable workflow is called only by the release workflow
        # running from protected main, so external actors cannot choose the cache contents.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning]
        id: cache
        with:
          path: |
            usr-local-cargo-registry
            app-target
          key: cache-${{ hashFiles('Dockerfile') }}

      - name: Inject cache into Docker
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "usr-local-cargo-registry": "/usr/local/cargo/registry",
              "app-target": "/app/target"
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}
        # cache-poisoning: this reusable workflow is called only by the release workflow
        # running from protected main, so external actors cannot choose the cache contents.

      - name: Extract release image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ inputs.release_tag }}
          flavor: latest=false

      - name: Build release Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: bookshelf-api:release
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: ./.github/actions/setup-rust-toolchain

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]

      - name: Start PostgreSQL
        run: sudo systemctl start postgresql.service

      - name: Wait for PostgreSQL
        run: |
          for _ in {1..30}; do
            if pg_isready; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready in time" >&2
          exit 1

      - name: Create DB user
        run: |
          sudo -u postgres psql \
            --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" \
            --command="\du" \
            postgres

      - name: Create DB
        run: sudo -u postgres createdb --owner=bookshelf bookshelf

      - name: Start API JWKS server
        run: |
          cargo run --locked -p bookshelf-e2e \
            --bin bookshelf-jwks-server > "${RUNNER_TEMP}/jwks.log" 2>&1 &
          for _ in {1..600}; do
            if curl -fs http://localhost:9999/.well-known/jwks.json > /dev/null; then
              echo "JWKS server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::JWKS server did not become ready in time"
          cat "${RUNNER_TEMP}/jwks.log"
          exit 1

      - name: Start release container
        run: |
          docker run -d --name bookshelf-api --network=host \
            -e PORT=8080 \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e ALLOWED_ORIGINS=http://localhost:8080 \
            -e JWT_AUDIENCE=test-audience \
            -e JWT_DOMAIN=test-issuer.local \
            -e JWKS_URL=http://localhost:9999/.well-known/jwks.json \
            bookshelf-api:release
          for _ in {1..60}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become ready in time"
          docker logs bookshelf-api
          exit 1

      - name: Run API E2E tests
        env:
          TEST_SERVER_URL: http://localhost:8080
        run: cargo test -p bookshelf-e2e --locked -- --test-threads=1

      - name: Export validated image
        run: |
          image_id=$(docker image inspect bookshelf-api:release --format '{{.Id}}')
          echo "${image_id}" | tee "${RUNNER_TEMP}/validated-image-id"
          docker save bookshelf-api:release |
            zstd --threads=0 -o "${RUNNER_TEMP}/validated-image.tar.zst"

      - name: Upload validated image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-release-image
          path: |
            ${{ runner.temp }}/validated-image-id
            ${{ runner.temp }}/validated-image.tar.zst
          compression-level: 0
          retention-days: 1

  push_to_registry:
    name: Push validated image
    needs: validate_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download validated image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-release-image
          path: ${{ runner.temp }}/validated-release-image

      - name: Load and verify validated image
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          artifact_dir="${RUNNER_TEMP}/validated-release-image"
          zstd --decompress --stdout "${artifact_dir}/validated-image.tar.zst" |
            docker load

          expected_id=$(cat "${artifact_dir}/validated-image-id")
          loaded_id=$(docker image inspect bookshelf-api:release --format '{{.Id}}')
          if [[ "${loaded_id}" != "${expected_id}" ]]; then
            echo "::error::Loaded image ${loaded_id} does not match validated image ${expected_id}"
            exit 1
          fi

          release_image="${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}"
          docker tag bookshelf-api:release "${release_image}"
          echo "Validated image ID: ${loaded_id}"
          echo "Release image: ${release_image}"

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push validated image
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: docker push "${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}"

  # secrets-outside-env: this trusted release job passes the Render hook through
  # the step environment and does not require a GitHub Environment.
  deploy: # zizmor: ignore[secrets-outside-env]
    name: Deploy
    needs: push_to_registry
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl --fail-with-body "${RENDER_DEPLOY_HOOK}"

  test-integration-bookshelf:
    name: Integration tests (bookshelf frontend)
    needs: push_to_registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - name: Check out bookshelf frontend
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: hiterm/bookshelf
          ref: main
          path: bookshelf-src
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: bookshelf-src/package.json

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: bookshelf-src/pnpm-lock.yaml

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bookshelf-src/pnpm-lock.yaml') }}

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull validated image
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: docker pull "${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}"

      - name: Prepare frontend integration tests
        run: |
          pnpm install --frozen-lockfile
          pnpm run generate
          pnpm exec playwright install --with-deps chromium
        working-directory: bookshelf-src

      - name: Start PostgreSQL
        run: sudo systemctl start postgresql.service

      - name: Wait for PostgreSQL
        run: |
          for _ in {1..30}; do
            if pg_isready; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready in time" >&2
          exit 1

      - name: Create DB user
        run: |
          sudo -u postgres psql \
            --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" \
            --command="\du" \
            postgres

      - name: Create DB
        run: sudo -u postgres createdb --owner=bookshelf bookshelf

      - name: Start frontend JWKS server
        run: |
          node bookshelf-src/e2e-integration/jwks-server.mjs \
            > "${RUNNER_TEMP}/jwks.log" 2>&1 &
          for _ in {1..30}; do
            if curl -fs http://localhost:9999/.well-known/jwks.json > /dev/null; then
              echo "JWKS server is ready"
              exit 0
            fi
            sleep 1
          done
          cat "${RUNNER_TEMP}/jwks.log"
          exit 1

      - name: Start release container
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          docker run -d --name bookshelf-api --network=host \
            -e PORT=8080 \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e ALLOWED_ORIGINS=http://localhost:4173 \
            -e JWT_AUDIENCE=test-audience \
            -e JWT_DOMAIN=test-issuer.local \
            -e JWKS_URL=http://localhost:9999/.well-known/jwks.json \
            "${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}"
          for _ in {1..60}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become ready in time"
          docker logs bookshelf-api
          exit 1

      - name: Run e2e-integration tests
        run: pnpm run test:integration
        working-directory: bookshelf-src
