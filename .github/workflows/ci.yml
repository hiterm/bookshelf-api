name: Continuous integration

on:
  push:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: true
        type: string
      release_pr_head_sha:
        description: Release pull request head SHA to receive the aggregate status
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: sudo systemctl start postgresql.service
      - run: pg_isready
      - run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" --command="\du" postgres
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf
      - run: cargo test --all-features --locked

  test-image-building:
    name: Test Image Building
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache
        with:
          path: |
            usr-local-cargo-registry
            app-target
          key: cache-${{ hashFiles('Dockerfile') }}
      - name: inject cache into docker
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "usr-local-cargo-registry": "/usr/local/cargo/registry",
              "app-target": "/app/target"
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: false
          load: true
          tags: bookshelf-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build tls-check image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: false
          load: true
          tags: bookshelf-api:tls-check
          target: tls-check
          cache-from: type=gha
      - name: Verify HTTPS connectivity via reqwest
        run: docker run --rm bookshelf-api:tls-check

      - name: Run container and health check
        run: |
          docker network create test-network

          docker run -d --name postgres --network test-network \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_USER=bookshelf \
            -e POSTGRES_DB=bookshelf \
            postgres:15

          # Wait for PostgreSQL to be ready
          for i in {1..30}; do
            if docker exec postgres pg_isready -U bookshelf; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 1
          done

          docker run -d --name test-container --network test-network -p 8080:8080 \
            -e PORT=8080 \
            -e DATABASE_URL=postgres://bookshelf:password@postgres:5432/bookshelf \
            -e ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080 \
            -e RUST_LOG=debug \
            -e JWT_AUDIENCE=dummy \
            -e JWT_DOMAIN=dummy \
            bookshelf-api:test

          for i in {1..20}; do
            if curl --fail http://localhost:8080/health 2>/dev/null; then
              echo "Health check passed after ${i} seconds"
              docker stop -t 1 test-container postgres
              docker network remove test-network
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed after 20 seconds"
          echo "=== Container Logs ==="
          docker logs test-container
          docker stop -t 1 test-container postgres
          docker network remove test-network
          exit 1

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --locked -- -D warnings

  migration-test:
    name: Migration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - run: sudo systemctl start postgresql.service
      - run: pg_isready
      - run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" postgres
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf_migration_test_empty
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf_migration_test_data
      - run: node migrations/test/test_migration.mjs
        env:
          MIGRATION_TEST_EMPTY_URL: postgres://bookshelf:password@localhost:5432/bookshelf_migration_test_empty
          MIGRATION_TEST_DATA_URL: postgres://bookshelf:password@localhost:5432/bookshelf_migration_test_data

  check-schema:
    name: Check Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Generate schema
        run: cargo run --bin gen_schema --locked > /tmp/schema.graphql.generated
      - name: Check schema is up to date
        run: diff schema.graphql /tmp/schema.graphql.generated

  release-pr-status:
    name: Release PR CI status
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: [test, test-image-building, fmt, clippy, migration-test, check-schema]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.release_pr_head_sha }}
          REPOSITORY: ${{ github.repository }}
          RESULTS: ${{ join(needs.*.result, ',') }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=error
          description="Release PR validation ended without a result"
          if [[ "${RESULTS}" == "success,success,success,success,success,success" ]]; then
            state=success
            description="Release PR validation passed"
          elif [[ ",${RESULTS}," == *,failure,* ]]; then
            state=failure
            description="Release PR validation failed"
          fi

          gh api --method POST \
            "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="${state}" \
            -f context=release-pr-ci \
            -f description="${description}" \
            -f target_url="${RUN_URL}"
