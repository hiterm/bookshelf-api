name: Continuous integration

on: [push]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --all-targets --locked
        env:
          RUSTFLAGS: "-D warnings"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://bookshelf:password@localhost:5432/bookshelf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: sudo systemctl start postgresql.service
      - run: pg_isready
      - run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" --command="\du" postgres
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf
      - run: cargo test --all-features --locked

  test-image-building:
    name: Test Image Building
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: cache
        with:
          path: |
            usr-local-cargo-registry
            app-target
          key: cache-${{ hashFiles('Dockerfile') }}
      - name: inject cache into docker
        uses: reproducible-containers/buildkit-cache-dance@1b8ab18fbda5ad3646e3fcc9ed9dd41ce2f297b4 # v3.3.2
        with:
          cache-map: |
            {
              "usr-local-cargo-registry": "/usr/local/cargo/registry",
              "app-target": "/app/target"
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: false
          load: true
          tags: bookshelf-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build tls-check image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: false
          load: true
          tags: bookshelf-api:tls-check
          target: tls-check
      - name: Verify HTTPS connectivity via reqwest
        run: docker run --rm bookshelf-api:tls-check

      - name: Run container and health check
        run: |
          docker network create test-network

          docker run -d --name postgres --network test-network \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_USER=bookshelf \
            -e POSTGRES_DB=bookshelf \
            postgres:15

          # Wait for PostgreSQL to be ready
          for i in {1..30}; do
            if docker exec postgres pg_isready -U bookshelf; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 1
          done

          docker run -d --name test-container --network test-network -p 8080:8080 \
            -e PORT=8080 \
            -e DATABASE_URL=postgres://bookshelf:password@postgres:5432/bookshelf \
            -e ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080 \
            -e RUST_LOG=debug \
            -e JWT_AUDIENCE=dummy \
            -e JWT_DOMAIN=dummy \
            bookshelf-api:test

          for i in {1..20}; do
            if curl --fail http://localhost:8080/health 2>/dev/null; then
              echo "Health check passed after ${i} seconds"
              docker stop test-container postgres
              docker network remove test-network
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed after 20 seconds"
          echo "=== Container Logs ==="
          docker logs test-container
          docker stop test-container postgres
          docker network remove test-network
          exit 1

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --locked -- -D warnings

  migration-test:
    name: Migration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: sudo systemctl start postgresql.service
      - run: pg_isready
      - run: sudo -u postgres psql --command="CREATE USER bookshelf WITH SUPERUSER PASSWORD 'password'" postgres
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf_migration_test_empty
      - run: sudo -u postgres createdb --owner=bookshelf bookshelf_migration_test_data
      - run: node migrations/test/test_migration.mjs
        env:
          MIGRATION_TEST_EMPTY_URL: postgres://bookshelf:password@localhost:5432/bookshelf_migration_test_empty
          MIGRATION_TEST_DATA_URL: postgres://bookshelf:password@localhost:5432/bookshelf_migration_test_data

  check-schema:
    name: Check Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Generate schema
        run: cargo run --bin gen_schema --locked > /tmp/schema.graphql.generated
      - name: Check schema is up to date
        run: diff schema.graphql /tmp/schema.graphql.generated
