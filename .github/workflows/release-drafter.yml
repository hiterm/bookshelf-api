name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        id: release_drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: cargo-edit
      - name: Update Cargo.toml
        run: |
          cargo set-version ${{ steps.release_drafter.outputs.tag_name }}
        continue-on-error: true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Bump version to ${{ steps.release_drafter.outputs.tag_name }}
          branch: chore/bump-version
          title: "chore: bump version to ${{ steps.release_drafter.outputs.tag_name }}"
          body: |
            Automated version bump from Release Drafter
