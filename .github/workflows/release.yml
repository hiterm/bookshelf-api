name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  tagpr:
    name: Update release pull request or tag release
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: read
      pull-requests: write
      statuses: write
    outputs:
      release_tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-edit
      - name: Run tagpr
        id: tagpr
        uses: Songmu/tagpr@d1b8138b7a31075141b6cd64103de9485ced7ac9 # v1.20.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate release pull request
        if: ${{ steps.tagpr.outputs.pull_request != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.tagpr.outputs.pull_request }}
        run: |
          set -euo pipefail

          ref=$(jq -er '.head.ref' <<<"${PULL_REQUEST}")
          head_sha=$(jq -er '.head.sha' <<<"${PULL_REQUEST}")
          pull_request_url=$(jq -er '.html_url' <<<"${PULL_REQUEST}")

          report_status() {
            local context=$1
            local state=$2
            local description=$3

            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
              -f state="${state}" \
              -f context="${context}" \
              -f description="${description}" \
              -f target_url="${pull_request_url}"
          }

          dispatch_workflow() {
            local workflow=$1

            for attempt in {1..5}; do
              if gh workflow run "${workflow}" \
                --ref main \
                -f ref="${ref}" \
                -f release_pr_head_sha="${head_sha}"; then
                return 0
              fi

              if [[ "${attempt}" -lt 5 ]]; then
                sleep $((attempt * 2))
              fi
            done

            return 1
          }

          report_status release-pr-ci pending "Release PR CI is queued"
          report_status release-pr-api-e2e pending "Release PR API E2E is queued"
          report_status release-pr-frontend-integration pending \
            "Release PR frontend integration is queued"

          dispatch_failed=0

          if ! dispatch_workflow ci.yml; then
            report_status release-pr-ci error \
              "Could not dispatch release PR CI"
            echo "::error::Could not dispatch release pull request CI after 5 attempts"
            dispatch_failed=1
          fi

          if ! dispatch_workflow e2e.yml; then
            report_status release-pr-api-e2e error \
              "Could not dispatch release PR API E2E"
            report_status release-pr-frontend-integration error \
              "Could not dispatch release PR frontend integration"
            echo "::error::Could not dispatch release pull request E2E after 5 attempts"
            dispatch_failed=1
          fi

          if [[ "${dispatch_failed}" -ne 0 ]]; then
            exit 1
          fi
      - name: Determine release tag
        id: release_tag
        env:
          TAGPR_TAG: ${{ steps.tagpr.outputs.tag }}
        run: |
          tag="${TAGPR_TAG}"
          if [[ -z "${tag}" ]]; then
            git fetch --force --tags origin
            tag=$(git tag --points-at HEAD | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$' | sort -V | tail -n 1)
          fi

          if [[ -n "${tag}" ]] && [[ ! "${tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tagpr returned a non-SemVer tag: ${tag}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy release
    if: ${{ needs.tagpr.outputs.release_tag != '' }}
    needs: tagpr
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: ${{ needs.tagpr.outputs.release_tag }}
    # secrets-inherit: deploy.yml is repository-local and needs GITHUB_TOKEN plus
    # RENDER_DEPLOY_HOOK only for the trusted main release path.
    secrets: inherit # zizmor: ignore[secrets-inherit]
